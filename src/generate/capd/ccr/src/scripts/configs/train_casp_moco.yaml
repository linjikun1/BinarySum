# CCR CASP Training Config
# 架构占位符: x64_O1 (运行时替换为实际架构)

dataset_name: ../data/bimodal-lmpa-shuffled-cg
run_name: CASP-moco-lmpa-c-only
output_dir: ../save/x64_O1/CASP/cg-casp-moco-lmpa-c-only

# Assembly Model (选择对应架构的 longcodeart)
assembly_model_name_or_path: ../model/longcodeart-x86

# Source Model
source_model_name_or_path: ../model/codet5p-110m-embedding

use_momentum_encoder: true

trust_remote_code: true
dataloader_num_workers: 8
remove_unused_columns: false
do_train: true
do_eval: true

per_device_train_batch_size: 2
queue_size: 4096
momentum: 0.999
gradient_accumulation_steps: 1
per_device_eval_batch_size: 64

num_train_epochs: 2
learning_rate: 0.00005
warmup_steps: 1000
weight_decay: 0.01
lr_scheduler_type: cosine
evaluation_strategy: steps
eval_steps: 500
save_steps: 500
logging_steps: 10
save_total_limit: 2

cache_dir: ../save/.cache
push_to_hub: false
overwrite_output_dir: true
resume_from_checkpoint: false
torch_compile: false
fp16: true
